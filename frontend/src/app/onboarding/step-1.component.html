<div class="step-overline">{{ 'app.onboarding.step1.overline' | translate }}</div>
<h1 class="step-title">{{ 'app.onboarding.step1.title' | translate }}</h1>
<p class="step-lead">{{ 'app.onboarding.step1.lead' | translate }}</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="step-form">
    <div class="step-field">
        <label for="ob-name" class="step-label">{{ 'app.onboarding.step1.nameLabel' | translate }}</label>
        <input
            id="ob-name"
            type="text"
            formControlName="name"
            class="step-input"
            [placeholder]="'app.onboarding.step1.namePlaceholder' | translate"
            autocomplete="off"
        />
    </div>

    <div class="step-field">
        <label for="ob-description" class="step-label">
            {{ 'app.onboarding.step1.descriptionLabel' | translate }}
            <span class="step-hint">{{ 'app.onboarding.step1.optional' | translate }}</span>
        </label>
        <textarea
            id="ob-description"
            formControlName="description"
            class="step-textarea"
            rows="2"
            [placeholder]="'app.onboarding.step1.descriptionPlaceholder' | translate"
        ></textarea>
    </div>

    <div class="step-actions">
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving()">
            {{ (saving() ? 'app.actions.loading' : 'app.onboarding.shell.continue') | translate }}
        </button>
    </div>
</form>
