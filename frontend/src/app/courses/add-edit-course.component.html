<div class="form-page">
    <div class="form-head">
        <div class="form-overline">{{ 'app.courses.formOverline' | translate }}</div>
        <h1 class="form-title">{{ (id() === null ? 'app.courses.new' : 'app.courses.edit') | translate }}</h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">
        <div class="field">
            <label for="course-name" class="field-label">{{ 'app.common.name' | translate }}</label>
            <input id="course-name" type="text" formControlName="name" class="input" [placeholder]="'app.courses.namePlaceholder' | translate" />
        </div>
        <div class="field">
            <label for="course-description" class="field-label">{{ 'app.common.description' | translate }}</label>
            <uk-markdown-editor
                formControlName="description"
                inputId="course-description"
                [rows]="6"
            />
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="form.invalid || saving()">
                {{ (saving() ? 'app.actions.loading' : 'app.actions.save') | translate }}
            </button>
            <a routerLink="/courses" class="btn btn-secondary btn-lg">{{ 'app.actions.cancel' | translate }}</a>
        </div>
    </form>
</div>
