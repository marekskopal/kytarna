<div class="form-page">
    <h1 class="page-title">{{ (id() === null ? 'app.projects.new' : 'app.projects.edit') | translate }}</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-stack">
        <div class="field">
            <label for="project-name" class="field-label">{{ 'app.common.name' | translate }}</label>
            <input id="project-name" type="text" formControlName="name" class="input" />
        </div>
        <div class="field">
            <label for="project-description" class="field-label">{{ 'app.common.description' | translate }}</label>
            <uk-markdown-editor
                formControlName="description"
                inputId="project-description"
                [rows]="6"
            />
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving()">
                {{ (saving() ? 'app.actions.loading' : 'app.actions.save') | translate }}
            </button>
            <a routerLink="/projects" class="muted-link">{{ 'app.actions.cancel' | translate }}</a>
        </div>
    </form>

</div>
