server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # .mjs isn't in nginx's default mime.types; without this it is served as
    # application/octet-stream and the browser rejects it as an ES module script
    # (alphaTab loads its synth worker as .mjs modules from the app root).
    location ~* "\.mjs$" {
        types { }
        default_type text/javascript;
        etag off;
        if_modified_since off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* "\.(js|css|woff2)$" {
        etag off;
        if_modified_since off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
