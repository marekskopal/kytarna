name: kytarna

services:
    proxy:
        build:
            context: ./proxy
            dockerfile: Dockerfile
            args:
                ADMINER_USER: ${ADMINER_USER}
                ADMINER_PASSWORD: ${ADMINER_PASSWORD}
        environment:
            PROXY_HOST: ${PROXY_HOST}
            PROXY_PORT_SSL: ${PROXY_PORT_SSL}
        ports:
            - "${PROXY_PORT}:80"
            - "${PROXY_PORT_SSL}:443"
        restart: unless-stopped
        depends_on:
            frontend:
                condition: service_healthy
            backend:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - frontend
            - backend
        volumes:
            - ${PROXY_SSL_CERT}:/etc/nginx/ssl/server.pem:ro
            - ${PROXY_SSL_KEY}:/etc/nginx/ssl/server.key:ro

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - frontend

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        environment:
            APP_ENV: ${APP_ENV:-development}
            MYSQL_HOST: ${MYSQL_HOST}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            AUTHORIZATION_TOKEN_KEY: ${AUTHORIZATION_TOKEN_KEY}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
            BACKEND_FRANKENPHP_WORKERS: ${BACKEND_FRANKENPHP_WORKERS}
            BACKEND_CORS_ALLOWED_ORIGIN: ${BACKEND_CORS_ALLOWED_ORIGIN}
            BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL}
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASSWORD: ${SMTP_PASSWORD}
            EMAIL_FROM: ${EMAIL_FROM}
            PROXY_HOST: ${PROXY_HOST}
            PROXY_PORT_SSL: ${PROXY_PORT_SSL}
            S3_ENDPOINT: ${S3_ENDPOINT}
            S3_REGION: ${S3_REGION}
            S3_BUCKET: ${S3_BUCKET}
            S3_ACCESS_KEY: ${S3_ACCESS_KEY}
            S3_SECRET_KEY: ${S3_SECRET_KEY}
            S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE}
            LECTURE_FILE_MAX_SIZE_MB: ${LECTURE_FILE_MAX_SIZE_MB}
            REDIS_HOST: ${REDIS_HOST}
            REDIS_PORT: ${REDIS_PORT}
            REDIS_PASSWORD: ${REDIS_PASSWORD}
            MEMCACHED_HOST: ${MEMCACHED_HOST}
            MEMCACHED_PORT: ${MEMCACHED_PORT}
            MCP_SESSION_TTL: ${MCP_SESSION_TTL}
            RABBITMQ_HOST: ${RABBITMQ_HOST}
            RABBITMQ_PORT: ${RABBITMQ_PORT}
            RABBITMQ_USER: ${RABBITMQ_USER}
            RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
            BACKEND_AMQP_CONSUMER_PREFETCH: ${BACKEND_AMQP_CONSUMER_PREFETCH}
            TAB_SERVICE_URL: ${TAB_SERVICE_URL}
        depends_on:
            redis:
                condition: service_healthy
            memcached:
                condition: service_started
            rabbitmq:
                condition: service_healthy
            tab-service:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-fsS", "http://127.0.0.1/api/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        networks:
            - backend
        volumes:
            - ./log:/app/log

    tab-service:
        build:
            context: ./tab-service
            dockerfile: Dockerfile
        environment:
            TAB_SERVICE_PORT: ${TAB_SERVICE_PORT}
            TAB_SERVICE_MAX_BODY_BYTES: ${TAB_SERVICE_MAX_BODY_BYTES}
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.TAB_SERVICE_PORT||8080)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - backend

    db:
        image: mariadb:11.8
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s
        networks:
            - backend
        volumes:
            - kytarna_data:/var/lib/mysql
        profiles:
            - dev

    adminer:
        image: adminer:5.4.2
        restart: unless-stopped
        networks:
            - frontend
            - backend

    mailpit:
        image: axllent/mailpit:v1.30
        restart: unless-stopped
        networks:
            - backend
            - frontend
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        profiles:
            - dev

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
        restart: unless-stopped
        networks:
            - backend
        ports:
            # Admin console — loopback only; reach it on a server via an SSH tunnel.
            # Host port 9101 (not 9001) to avoid colliding with the sibling
            # ukolio-minio container that already owns 9001 on this shared host.
            - "127.0.0.1:9101:9001"
        volumes:
            - kytarna_minio:/data
        profiles:
            - dev

    memcached:
        image: memcached:1.6.42-alpine
        restart: unless-stopped
        networks:
            - backend

    redis:
        image: redis:8.8.0-alpine
        restart: unless-stopped
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD}
        command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s
        networks:
            - backend
        volumes:
            - kytarna_redis:/data

    rabbitmq:
        image: rabbitmq:4.3.2-alpine
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        healthcheck:
            test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s
        networks:
            - backend
        volumes:
            - kytarna_rabbitmq:/var/lib/rabbitmq

    mariadb-backup-aws:
        image: marekskopal/mariadb-backup-aws:0.2.0
        environment:
            DB_HOST: ${MYSQL_HOST}
            DB_DATABASE: ${MYSQL_DATABASE}
            DB_USER: ${MYSQL_USER}
            DB_PASSWORD: ${MYSQL_PASSWORD}
            AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            AWS_REGION: ${AWS_REGION}
            AWS_BUCKET: ${AWS_BUCKET}
        networks:
            - backend
        volumes:
            - ./log:/app/log

networks:
    frontend:
        name: kytarna_frontend
    backend:
        name: kytarna_backend

volumes:
    kytarna_data:
        name: kytarna_data
    kytarna_minio:
        name: kytarna_minio
    kytarna_redis:
        name: kytarna_redis
    kytarna_rabbitmq:
        name: kytarna_rabbitmq
